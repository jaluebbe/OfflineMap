<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="manifest" href="/static/manifest_simple.json">
    <link rel="apple-touch-icon" href="/static/img/icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OfflineMap">
    <meta name="theme-color" content="#1e64a0">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/static/img/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">
    <title>OfflineMap</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <meta name="format-detection" content="telephone=no">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
    <link rel="stylesheet" href="leaflet/leaflet.css">
    <link rel="stylesheet" href="maplibre-gl/maplibre-gl.css">
    <link rel="stylesheet" href="leaflet/leaflet-geoman.css">
    <link rel="stylesheet" href="leaflet/leaflet-measure-path.css">
    <link rel="stylesheet" href="/static/leaflet_map_common.css">
    <style>
        #textInput {
            width: 100px;
        }

        #io-control {
            padding: 0;
        }

        #utm-display {
            font-size: 12px;
            padding-top: 4px;
            color: #444;
        }
    </style>
</head>

<body>
    <template id="coordinateControlTemplate">
        <div id="search-control">
            <input type="text" id="coordinate-input" placeholder="Enter coordinate">
            <button id="coordinate-go-button">Go</button>
        </div>

        <div id="coordinate-result"></div>
    </template>

    <template id="featureControlTemplate">
        <div id="io-control">
            <input id="fileInput" name="fileInput" type="file"
                   accept=".geojson,.json,application/geo+json,application/json"
                   onchange="importEditor()" hidden>

            <div class="io-buttons">
                <button id="openButton" onclick="fileInput.click()">Open</button>
                <button id="exportButton" onclick="exportEditor()">Export</button>
                <button id="clearButton" onclick="clearEditor()">Clear</button>
            </div>
        </div>

        <div class="legend-item">
            <input type="color" id="colorInput" name="colorInput"
                   value="#3388ff" onchange="updateFeatureProperties()">

            <input type="checkbox" id="measureCheckbox" name="measureCheckbox"
                   onchange="updateFeatureProperties()">
            <label for="measureCheckbox">measure</label>

            <input type="checkbox" id="fillCheckbox" name="fillCheckbox"
                   checked onchange="updateFeatureProperties()">
            <label for="fillCheckbox">fill</label>
        </div>

        <div class="legend-item">
            <input type="text" id="textInput" name="textInput"
                   placeholder="Enter text" onchange="updateFeatureProperties()">
        </div>
    </template>

    <div id="map"></div>
    <script src="leaflet/leaflet.js"></script>
    <script src="leaflet/leaflet-geoman.min.js"></script>
    <script src="leaflet/leaflet-measure-path.js"></script>
    <script src="leaflet/leaflet-color-markers.js"></script>
    <script src="maplibre-gl/maplibre-gl.js"></script>
    <script src="maplibre-gl/leaflet-maplibre-gl.js"></script>
    <script src="turf.min.js" charset="utf-8"></script>
</body>
<script src="/static/leaflet_map_offline.js"></script>
<script>
    window.locationPickerFields = ['latlon', 'mgrs'];
    window.pmControlOptions = {
        drawMarker: false,
        drawRectangle: false,
        cutPolygon: false,
        rotateMode: false
    };
    var combinedControl = L.control({
        position: 'bottomright'
    });

    combinedControl.onAdd = function(map) {
        this._div = L.DomUtil.create('div', 'combined-control');

        let coordSection = L.DomUtil.create('div', 'section', this._div);
        let coordHeader = L.DomUtil.create('div', 'section-header', coordSection);
        coordHeader.innerHTML = `
            <span>Coordinates</span>
            <span class="arrow">&#9662;</span>
        `;
        let coordContent = L.DomUtil.create('div', 'section-content', coordSection);
        coordContent.appendChild(
            document.getElementById('coordinateControlTemplate').content.cloneNode(true)
        );

        let featureSection = L.DomUtil.create('div', 'section', this._div);
        let featureHeader = L.DomUtil.create('div', 'section-header', featureSection);
        featureHeader.innerHTML = `
            <span>Features</span>
            <span class="arrow">&#9662;</span>
        `;
        let featureContent = L.DomUtil.create('div', 'section-content', featureSection);
        featureContent.appendChild(
            document.getElementById('featureControlTemplate').content.cloneNode(true)
        );

        L.DomEvent.disableClickPropagation(this._div);

        coordHeader.addEventListener("click", () => {
            coordSection.classList.toggle("collapsed");
        });

        featureHeader.addEventListener("click", () => {
            featureSection.classList.toggle("collapsed");
        });

        if (window.innerWidth < 768) {
            featureSection.classList.add("collapsed");
        }

        return this._div;
    };

    combinedControl.addTo(map);
</script>
<script src="/static/leaflet_location_picker.js"></script>
<script src="/static/dop_layers.js"></script>
<script src="/static/leaflet_editor.js"></script>
<script src="/static/leaflet_compass.js"></script>
<script>
    const gpsCompassLine = L.polyline([], {
        color: 'orange',
        weight: 2,
        showMeasurements: false,
        pmIgnore: true,
        interactive: false
    });

    const gpsCircle = L.circle([0, 0], {
        radius: 0,
        color: 'blue',
        weight: 2,
        fill: false
    });

    const gpsCompassLayer = L.layerGroup([gpsCircle, gpsCompassLine]);
    layerControl.addOverlay(gpsCompassLayer, 'GPS + Compass');

    let gpsActive = false;
    let _lastLatlng = null;

    map.on('locationfound', e => {
        const latlng = e.latlng.wrap();
        _lastLatlng = latlng;
        _gpsCenter = latlng;
        gpsCircle.setLatLng(latlng);
        if (isFinite(e.accuracy)) gpsCircle.setRadius(e.accuracy);
        updateCompassLine();
        if (allowAutoSetPicker) {
            locationPickerMarker.setLatLng(latlng);
            allowAutoSetPicker = false;
        }
    });

    map.on('overlayadd', e => {
        if (e.layer === gpsCompassLayer) {
            gpsActive = true;
            map.locate({ watch: true, enableHighAccuracy: true });
            requestCompass();
        }
    });

    map.on('overlayremove', e => {
        if (e.layer === gpsCompassLayer) {
            gpsActive = false;
            map.stopLocate();
            removeCompassListeners();
            gpsCompassLine.setLatLngs([]);
            gpsCircle.setRadius(0);
        }
    });

    map.zoomControl.setPosition('topright');
</script>
<script type="module">
    import { parseCoordinate, convertLatlon } from '/static/coordinate_parser.js';
    window.parseCoordinate = parseCoordinate;
    window.convertLatlon = convertLatlon;
</script>
</html>
