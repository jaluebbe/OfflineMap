<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/img/icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OfflineMap">
    <meta name="theme-color" content="#1e64a0">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/static/img/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">
    <title>OfflineMap</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <meta name="format-detection" content="telephone=no">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
    <link rel="stylesheet" href="leaflet/leaflet.css">
    <link rel="stylesheet" href="maplibre-gl/maplibre-gl.css">
    <link rel="stylesheet" href="leaflet/leaflet-geoman.css">
    <link rel="stylesheet" href="leaflet/leaflet-measure-path.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #000;
        }

        #map {
            position: fixed;
            height: 100%;
            width: 100%;
            min-height: 285px;
        }

        #region-control {
            display: grid;
            grid-gap: 5px;
        }

        #search-control {
            padding-top: 5px;
            display: grid;
            grid-template-columns: auto auto;
            grid-gap: 5px;
        }

        .legend-control {
            background: white;
            line-height: 1.5;
            color: #333;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            padding: 5px;
        }

        .coordinate-control {
            background: white;
            line-height: 1.5;
            color: #333;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            padding: 5px;
        }

        .legend-header {
            font-size: 14px;
            text-align: center;
            font-weight: bold;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        #coordinate-input {
            min-width: 120px;
        }

        #coordinate-result {
            padding: 5px;
            font-size: 12px;
            display: grid;
            grid-template-columns: auto auto;
            grid-gap: 5px;
        }

        #textInput {
            width: 120px;
        }

        #io-control {
            display: grid;
            grid-gap: 5px;
            padding: 5px;
        }

        .io-buttons {
            display: grid;
            grid-template-columns: auto auto auto;
            grid-gap: 5px;
        }

        .leaflet-bottom {
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) * 0.25);
        }

        .leaflet-left {
            padding-left: calc(env(safe-area-inset-left, 0px) * 0.75);
        }

        .leaflet-right {
            padding-right: calc(env(safe-area-inset-right, 0px) * 0.75);
        }

        .leaflet-top {
            padding-top: calc(env(safe-area-inset-top, 0px) * 0.75);
        }

        .leaflet-control-attribution {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
    </style>
</head>

<body>
    <template id="featureControlTemplate">
        <div class="legend-item">
            <input type="color" id="colorInput" name="colorInput" value="#3388ff" onchange="updateFeatureProperties()">
            <input type="checkbox" id="measureCheckbox" name="measureCheckbox" onchange="updateFeatureProperties()">
            <label for="measureCheckbox">measure</label>
            <input type="checkbox" id="fillCheckbox" name="fillCheckbox" checked onchange="updateFeatureProperties()">
            <label for="fillCheckbox">fill</label>
        </div>
        <div class="legend-item">
            <input type="text" id="textInput" name="textInput" placeholder="Enter text" onchange="updateFeatureProperties()">
        </div>
    </template>
    <div id="map"></div>
    <script src="leaflet/leaflet.js"></script>
    <script src="leaflet/leaflet-geoman.min.js"></script>
    <script src="leaflet/leaflet-measure-path.js"></script>
    <script src="leaflet/leaflet-color-markers.js"></script>
    <script src="maplibre-gl/maplibre-gl.js"></script>
    <script src="maplibre-gl/leaflet-maplibre-gl.js"></script>
    <script src="turf.min.js" charset="utf-8"></script>
    <template id="coordinateControlTemplate">
        <div id="io-control">
            <input id="fileInput" name="fileInput" type="file" accept=".geojson,.json,application/geo+json,application/json" onchange="importEditor()" hidden>
            <div class="io-buttons">
                <button id="openButton" onclick="fileInput.click()">Open</button>
                <button id="exportButton" onclick="exportEditor()">Export</button>
                <button id="clearButton" onclick="clearEditor()">Clear</button>
            </div>
        </div>
        <div id="search-control">
            <input type="text" id="coordinate-input" placeholder="Enter coordinate">
            <button id="coordinate-go-button">Go</button>
        </div>
        <div id="coordinate-result"></div>
    </template>
</body>
<script src="/static/leaflet_map_offline.js"></script>
<script>
    window.locationPickerFields = ['latlon', 'mgrs'];
    window.pmControlOptions = {
        drawMarker: false,
        drawRectangle: false,
        cutPolygon: false,
        rotateMode: false
    };
</script>
<script src="/static/leaflet_location_picker.js"></script>
<script src="/static/dop_layers.js"></script>
<script src="/static/leaflet_editor.js"></script>
<script>
    map.zoomControl.setPosition('topright');
</script>
</html>
