<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/img/icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OfflineMap">
    <meta name="theme-color" content="#1e64a0">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/static/img/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">
    <title>OfflineMap</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
    <link rel="stylesheet" href="leaflet/leaflet.css">
    <link rel="stylesheet" href="maplibre-gl/maplibre-gl.css">
    <link rel="stylesheet" href="leaflet/leaflet-geoman.css">
    <link rel="stylesheet" href="leaflet/leaflet-measure-path.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #000;
        }

        #map {
            position: fixed;
            height: 100%;
            width: 100%;
            min-height: 285px;
        }

        #region-control {
            display: grid;
            gap: 5px;
        }

        #search-control {
            padding-top: 5px;
            display: grid;
            grid-template-columns: auto auto;
            gap: 5px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        #coordinate-input {
            min-width: 120px;
        }

        #coordinate-result {
            padding: 5px;
            font-size: 12px;
            display: grid;
            grid-template-columns: auto auto;
            gap: 5px;
        }

        #textInput {
            width: 120px;
        }

        #io-control {
            display: grid;
            gap: 5px;
            padding: 5px;
        }

        .io-buttons {
            display: grid;
            grid-template-columns: auto auto auto;
            gap: 5px;
        }

        .leaflet-bottom {
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) * 0.25);
        }

        .leaflet-left {
            padding-left: calc(env(safe-area-inset-left, 0px) * 0.75);
        }

        .leaflet-right {
            padding-right: calc(env(safe-area-inset-right, 0px) * 0.75);
        }

        .leaflet-top {
            padding-top: calc(env(safe-area-inset-top, 0px) * 0.75);
        }

        .leaflet-control-attribution {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        .combined-control {
            background: white;
            color: #333;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 6px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: max-content;
        }

        .section {
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow: hidden;
        }

        .section-header {
            background: #f0f0f0;
            padding: 6px 8px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header .arrow {
            transition: transform 0.25s ease;
        }

        .section.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .section-content {
            padding: 6px 8px;
            background: white;
            transition: max-height 0.25s ease-out, opacity 0.25s ease-out, padding 0.25s ease-out;
            max-height: 1000px;
            opacity: 1;
        }

        .section.collapsed .section-content {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
        }

        #utm-display {
            font-size: 12px;
            padding-top: 4px;
            color: #444;
        }
    </style>
</head>

<body>
    <template id="coordinateControlTemplate">
        <div id="search-control">
            <input type="text" id="coordinate-input" placeholder="Enter coordinate">
            <button id="coordinate-go-button">Go</button>
        </div>

        <div id="coordinate-result"></div>

        <div id="utm-display"></div>
    </template>
    <template id="featureControlTemplate">
        <div id="io-control">
            <input id="fileInput" name="fileInput" type="file"
                   accept=".geojson,.json,application/geo+json,application/json"
                   onchange="importEditor()" hidden>

            <div class="io-buttons">
                <button type="button" id="openButton" onclick="fileInput.click()">Open</button>
                <button type="button" id="exportButton" onclick="exportEditor()">Export</button>
                <button type="button" id="clearButton" onclick="clearEditor()">Clear</button>
            </div>
        </div>

        <div class="legend-item">
            <input type="color" id="colorInput" name="colorInput"
                   value="#3388ff" onchange="updateFeatureProperties()">

            <input type="checkbox" id="measureCheckbox" name="measureCheckbox"
                   onchange="updateFeatureProperties()">
            <label for="measureCheckbox">measure</label>

            <input type="checkbox" id="fillCheckbox" name="fillCheckbox"
                   checked onchange="updateFeatureProperties()">
            <label for="fillCheckbox">fill</label>
        </div>

        <div class="legend-item">
            <input type="text" id="textInput" name="textInput"
                   placeholder="Enter text" onchange="updateFeatureProperties()">
        </div>
    </template>
    <template id="regionLocationTemplate">
        <div id="region-control">
            <select id="state-select" onchange="stateSelectionChanged()">
                <option value="">State selection</option>
            </select>
            <select id="district-select" onchange="districtSelectionChanged()" hidden>
                <option value="">District selection</option>
            </select>
            <select id="community-select" onchange="communitySelectionChanged()" hidden>
                <option value="">Community selection</option>
            </select>
            <input type="text" id="plz-input" placeholder="Enter PLZ" oninput="plzChanged()">
        </div>

        <div id="search-control">
            <input type="text" id="place-input" placeholder="Enter place name">
            <button type="button" id="place-go-button">Go</button>

            <input type="text" id="street-input" placeholder="Enter street name">
            <button type="button" id="street-go-button">Go</button>
        </div>
    </template>


    <div id="map"></div>
    <script src="leaflet/leaflet.js"></script>
    <script src="leaflet/leaflet-geoman.min.js"></script>
    <script src="leaflet/leaflet-measure-path.js"></script>
    <script src="leaflet/leaflet-color-markers.js"></script>
    <script src="maplibre-gl/maplibre-gl.js"></script>
    <script src="maplibre-gl/leaflet-maplibre-gl.js"></script>
    <script src="turf.min.js" charset="utf-8"></script>
</body>
<script src="/static/leaflet_map_offline.js"></script>
<script>
    var combinedControl = L.control({ position: 'bottomright' });

    combinedControl.onAdd = function(map) {
        this._div = L.DomUtil.create('div', 'combined-control');

        let coordSection = L.DomUtil.create('div', 'section', this._div);
        let coordHeader = L.DomUtil.create('div', 'section-header', coordSection);
        coordHeader.innerHTML = `<span>Coordinates</span><span class="arrow">&#9662;</span>`;
        let coordContent = L.DomUtil.create('div', 'section-content', coordSection);
        coordContent.appendChild(
            document.getElementById('coordinateControlTemplate').content.cloneNode(true)
        );

        let featureSection = L.DomUtil.create('div', 'section', this._div);
        let featureHeader = L.DomUtil.create('div', 'section-header', featureSection);
        featureHeader.innerHTML = `<span>Features</span><span class="arrow">&#9662;</span>`;
        let featureContent = L.DomUtil.create('div', 'section-content', featureSection);
        featureContent.appendChild(
            document.getElementById('featureControlTemplate').content.cloneNode(true)
        );

        let regionSection = L.DomUtil.create('div', 'section', this._div);
        let regionHeader = L.DomUtil.create('div', 'section-header', regionSection);
        regionHeader.innerHTML = `<span>Region / Location</span><span class="arrow">&#9662;</span>`;
        let regionContent = L.DomUtil.create('div', 'section-content', regionSection);
        regionContent.appendChild(
            document.getElementById('regionLocationTemplate').content.cloneNode(true)
        );

        L.DomEvent.disableClickPropagation(this._div);

        coordHeader.addEventListener("click", () => coordSection.classList.toggle("collapsed"));
        featureHeader.addEventListener("click", () => featureSection.classList.toggle("collapsed"));
        regionHeader.addEventListener("click", () => regionSection.classList.toggle("collapsed"));

        if (window.innerWidth < 768) {
            featureSection.classList.add("collapsed");
            regionSection.classList.add("collapsed");
        }

        return this._div;
    };

    combinedControl.addTo(map);
</script>
<script src="/static/leaflet_location_picker.js"></script>
<script src="/static/dop_layers.js"></script>
<script src="/static/leaflet_plz.js"></script>
<script src="/static/leaflet_regions.js"></script>
<script src="/static/leaflet_search.js"></script>
<script src="/static/leaflet_editor.js"></script>
<script>
    map.zoomControl.setPosition('topright');
</script>
<script type="module">
    import { parseCoordinate, convertLatlon } from '/static/coordinate_parser.js';
    window.parseCoordinate = parseCoordinate;
    window.convertLatlon = convertLatlon;
</script>

</html>
